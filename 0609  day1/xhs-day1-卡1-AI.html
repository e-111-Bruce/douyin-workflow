<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f5f5f5;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
}
.card {
  width: 400px;
  min-height: 720px;
  background: #ffffff;
  border-radius: 24px;
  padding: 44px 36px;
  display: flex;
  flex-direction: column;
  color: #1a1a2e;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  border: 1px solid #f0f0f5;
}
.emoji-badge {
  font-size: 48px;
  margin-bottom: 16px;
}
.tag {
  display: inline-block;
  background: #f0f0ff;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12px;
  color: #667eea;
  font-weight: 600;
  margin-bottom: 20px;
  width: fit-content;
}
.big-number {
  font-size: 72px;
  font-weight: 800;
  color: #667eea;
  opacity: 0.15;
  position: absolute;
  top: 24px;
  right: 28px;
  line-height: 1;
}
.title {
  font-size: 28px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 8px;
  color: #1a1a2e;
}
.sub {
  font-size: 16px;
  color: #888;
  line-height: 1.6;
  margin-bottom: 24px;
}
.content-box {
  background: #f8f9ff;
  border-left: 4px solid #667eea;
  border-radius: 0 12px 12px 0;
  padding: 18px 20px;
  font-size: 15px;
  line-height: 1.8;
  color: #333;
  margin-bottom: 16px;
}
.content-box2 {
  background: #fafafa;
  border-radius: 12px;
  padding: 16px 20px;
  font-size: 14px;
  line-height: 1.7;
  color: #555;
  margin-bottom: 12px;
}
.highlight-word {
  color: #667eea;
  font-weight: 600;
}
.quote {
  font-size: 20px;
  font-weight: 600;
  color: #1a1a2e;
  text-align: center;
  padding: 20px 0;
  line-height: 1.5;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.bottom-tag {
  margin-top: auto;
  font-size: 12px;
  color: #bbb;
  text-align: center;
  padding-top: 20px;
  letter-spacing: 1px;
}
.analogy-box {
  background: #fff8e6;
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 14px;
  line-height: 1.7;
  color: #8a6d2b;
  margin-top: 8px;
}
.three-cols {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}
.col {
  flex: 1;
  background: #f8f9ff;
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.col-icon { font-size: 24px; margin-bottom: 6px; }
.col-title { font-size: 13px; font-weight: 600; color: #333; }
.col-desc { font-size: 12px; color: #888; margin-top: 4px; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="big-number">1</div>
  <div class="emoji-badge">🧠</div>
  <span class="tag">文科生也想学AI · Day 1</span>
  <div class="title">AI 不是魔法<br>是规律发现器</div>
  <div class="sub">一句话说清 AI 是什么</div>
  <div class="content-box">
    AI 看了全互联网的资料，<br>
    然后找到了一个规律：<br><br>
    当人类问"XXX"时，<br>
    最优答是"YYY"。
  </div>
  <div class="analogy-box">
    💡 就像你看过 1 万条带货视频后，<br>
    不用背公式也知道"面料要配特写"。
  </div>
  <div class="quote">
    "AI 就是在诸多联系的<br>事物上寻找共性"
  </div>
  <div class="bottom-tag">#AI入门 #文科生学AI</div>
</div>
</body>
</html>
