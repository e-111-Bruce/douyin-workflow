<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f5f5f5;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
}
.card {
  width: 400px;
  min-height: 720px;
  background: #ffffff;
  border-radius: 24px;
  padding: 44px 36px;
  display: flex;
  flex-direction: column;
  color: #1a1a2e;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  border: 1px solid #f0f0f5;
}
.big-number {
  font-size: 72px;
  font-weight: 800;
  color: #667eea;
  opacity: 0.15;
  position: absolute;
  top: 24px;
  right: 28px;
  line-height: 1;
}
.emoji-badge { font-size: 48px; margin-bottom: 16px; }
.tag {
  display: inline-block;
  background: #f0f0ff;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12px;
  color: #667eea;
  font-weight: 600;
  margin-bottom: 20px;
  width: fit-content;
}
.title { font-size: 28px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; color: #1a1a2e; }
.sub { font-size: 16px; color: #888; line-height: 1.6; margin-bottom: 24px; }
.content-box {
  background: #f8f9ff;
  border-left: 4px solid #667eea;
  border-radius: 0 12px 12px 0;
  padding: 18px 20px;
  font-size: 15px;
  line-height: 1.8;
  color: #333;
  margin-bottom: 16px;
}
.analogy-box {
  background: #fff8e6;
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 14px;
  line-height: 1.7;
  color: #8a6d2b;
  margin-top: 8px;
}
.two-cols {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}
.col-compare {
  flex: 1;
  border-radius: 12px;
  padding: 16px;
}
.col-compare.left { background: #fee2e2; }
.col-compare.right { background: #dcfce7; }
.col-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; text-align: center; }
.col-title.bad { color: #b91c1c; }
.col-title.good { color: #16a34a; }
.col-desc {
  font-size: 13px;
  line-height: 1.7;
  color: #333;
  text-align: center;
}
.bottom-tag { margin-top: auto; font-size: 12px; color: #bbb; text-align: center; padding-top: 20px; letter-spacing: 1px; }
.quote {
  font-size: 16px;
  font-weight: 600;
  color: #667eea;
  text-align: center;
  padding: 16px 0;
  line-height: 1.5;
}
.script { margin-top: 10px; background: #f3f4f6; border-radius: 10px; padding: 12px 14px; font-size: 12px; color: #666; font-family: monospace; line-height: 1.8; }
</style>
</head>
<body>
<div class="card">
  <div class="big-number">3</div>
  <div class="emoji-badge">🎭</div>
  <span class="tag">文科生也想学AI · Day 1</span>
  <div class="title">提示词 = 剧本杀<br>角色设定</div>
  <div class="sub">你给AI的信息越详细，它越懂你</div>
  <div class="analogy-box">
    🎲 玩剧本杀，你说"给我个角色"<br>
    → 你得到路人甲<br><br>
    🎲 你说"我是民国上海名媛，<br>
    　　留洋回来，表面优雅实际在查案"<br>
    → 绝了，全员入戏
  </div>
  <div class="two-cols">
    <div class="col-compare left">
      <div class="col-title bad">❌ 随便写</div>
      <div class="col-desc">"帮我写个文案"<br><br>→ 泛泛的，用不了</div>
    </div>
    <div class="col-compare right">
      <div class="col-title good">✅ 认真写</div>
      <div class="col-desc">"法式衬衫，醋酸面料<br>25-35岁女性，60秒"<br><br>→ 直接能用</div>
    </div>
  </div>
  <div class="quote">
    Prompt = 参数<br>参数越精确，结果越有用
  </div>
  <div class="bottom-tag">#AI入门 #提示词技巧</div>
</div>
</body>
</html>
