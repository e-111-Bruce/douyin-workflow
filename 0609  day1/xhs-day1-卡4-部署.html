<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f5f5f5;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
}
.card {
  width: 400px;
  min-height: 720px;
  background: #ffffff;
  border-radius: 24px;
  padding: 44px 36px;
  display: flex;
  flex-direction: column;
  color: #1a1a2e;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  border: 1px solid #f0f0f5;
}
.big-number {
  font-size: 72px;
  font-weight: 800;
  color: #667eea;
  opacity: 0.15;
  position: absolute;
  top: 24px;
  right: 28px;
  line-height: 1;
}
.emoji-badge { font-size: 48px; margin-bottom: 12px; }
.tag {
  display: inline-block;
  background: #f0f0ff;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12px;
  color: #667eea;
  font-weight: 600;
  margin-bottom: 20px;
  width: fit-content;
}
.title { font-size: 28px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; color: #1a1a2e; }
.sub { font-size: 16px; color: #888; line-height: 1.6; margin-bottom: 24px; }
.content-box {
  background: #f8f9ff;
  border-left: 4px solid #667eea;
  border-radius: 0 12px 12px 0;
  padding: 18px 20px;
  font-size: 15px;
  line-height: 1.8;
  color: #333;
  margin-bottom: 16px;
}
.steps { margin-top: 4px; }
.step {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
}
.step-num {
  width: 28px;
  height: 28px;
  min-width: 28px;
  background: #667eea;
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
}
.step-text { font-size: 14px; color: #555; line-height: 1.6; padding-top: 3px; }
.analogy-box {
  background: #fff8e6;
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 14px;
  line-height: 1.7;
  color: #8a6d2b;
  margin-top: 16px;
}
.quote {
  font-size: 18px;
  font-weight: 600;
  color: #667eea;
  text-align: center;
  padding: 16px 0;
  line-height: 1.5;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.bottom-tag { margin-top: auto; font-size: 12px; color: #bbb; text-align: center; padding-top: 20px; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="card">
  <div class="big-number">4</div>
  <div class="emoji-badge">🏗️</div>
  <span class="tag">文科生也想学AI · Day 1</span>
  <div class="title">部署 = 搭舞台<br>让程序跑起来</div>
  <div class="sub">不是翻译，是搭建舞台</div>
  <div class="content-box">
    一个 AI 工具写好了代码，<br>
    就像你准备好了菜谱和食材。<br><br>
    部署就是：把灶台擦干净<br>
    把锅碗瓢盆摆好、打开煤气灶<br>
    —— 正式开炒！
  </div>
  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text"><strong>拿代码</strong> — 从网络下载工具</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text"><strong>装依赖</strong> — 装好它需要的东西</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text"><strong>配环境</strong> — 填好密钥和配置</div>
    </div>
    <div class="step">
      <div class="step-num">4</div>
      <div class="step-text"><strong>跑起来</strong> — 启动！正式开工</div>
    </div>
  </div>
  <div class="analogy-box">
    🎬 剧本 → 拍电影（制作）<br>→ 上映（部署）→ 观众能看（使用）
  </div>
  <div class="quote">没部署的代码 = 没开门的餐厅</div>
  <div class="bottom-tag">#AI入门 #部署</div>
</div>
</body>
</html>
