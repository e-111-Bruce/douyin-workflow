<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f5f5f5;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
}
.card {
  width: 400px;
  min-height: 720px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 24px;
  padding: 48px 36px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  color: #fff;
  position: relative;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(102,126,234,0.3);
}
.card::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -60px;
  width: 200px;
  height: 200px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
}
.card::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -40px;
  width: 160px;
  height: 160px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
}
.tag {
  display: inline-block;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(4px);
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  letter-spacing: 1px;
  margin-bottom: 20px;
  width: fit-content;
}
.title {
  font-size: 42px;
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 12px;
  letter-spacing: 2px;
}
.subtitle {
  font-size: 20px;
  font-weight: 300;
  opacity: 0.85;
  line-height: 1.6;
  margin-bottom: 40px;
}
.highlight {
  background: rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 16px 20px;
  font-size: 15px;
  line-height: 1.6;
  backdrop-filter: blur(4px);
}
.bottom-text {
  margin-top: auto;
  font-size: 13px;
  opacity: 0.6;
  text-align: center;
  padding-top: 30px;
}
</style>
</head>
<body>
<div class="card">
  <span class="tag">📖 文科生也想学AI</span>
  <div class="title">Day 1</div>
  <div class="subtitle">一个文科生<br>今天开始学 AI</div>
  <div class="highlight">
    没有编程基础，没有技术背景。<br>
    但我发现：AI 没那么可怕。<br><br>
    今天三小时，我搞懂了：<br>
    AI 是什么 · API 是什么<br>
    提示词怎么用 · 部署是啥
  </div>
  <div class="bottom-text">记录自学 AI 的第一天 ✨</div>
</div>
</body>
</html>
